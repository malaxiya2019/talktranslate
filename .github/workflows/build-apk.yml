name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Set minSdkVersion to 24 (required by flutter_tts)
        run: |
          cat android/app/build.gradle | head -5
          echo '---'
          # Add minSdkVersion 24 after defaultConfig {
          sed -i '/^android {/a\    defaultConfig {\n        minSdkVersion 24\n    }' android/app/build.gradle || true
          # Also try the simpler flutter format
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 24/' android/app/build.gradle || true
          cat android/app/build.gradle | head -20

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/*.apk
