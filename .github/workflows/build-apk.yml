name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64
      - name: Create Android platform files
        run: flutter create --platforms=android .
      - name: Override build.gradle with minSdk 24
        run: cp android/app/build.gradle android/app/build.gradle.bak && cat android/app/build.gradle.bak | sed 's/flutter.minSdkVersion/24/g' > android/app/build.gradle
      - name: Get packages
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/app-release.apk
