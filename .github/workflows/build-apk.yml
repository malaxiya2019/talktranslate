name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Set minSdkVersion to 24 (required by flutter_tts)
        run: |
          # Overwrite defaultConfig section to include minSdkVersion 24
          python3 -c "
import re
content = open('android/app/build.gradle').read()
# Replace flutter.minSdkVersion with 24
content = content.replace('flutter.minSdkVersion', '24')
# Make sure minSdk is 24
content = re.sub(r'minSdk\s*=\s*f\d+', 'minSdk = 24', content)
open('android/app/build.gradle','w').write(content)
print('minSdk set to 24')
"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/*.apk
