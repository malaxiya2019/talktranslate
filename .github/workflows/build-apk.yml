name: Build TalkTranslate

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both

jobs:
  # ── 代码质量检查 ──
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test || echo "No tests found"

  # ── APK/AAB 构建 ──
  build:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64

      - name: Get packages
        run: flutter pub get

      # 签名仅在 secrets 配置时启用
      - name: Decode keystore & create key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties << EOF
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' || github.event_name == 'push' }}
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both' }}
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-*-release.apk

      - name: Upload AAB artifact
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
