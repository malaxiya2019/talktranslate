name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64

      - name: Create Android files
        run: flutter create --platforms=android .

      - name: Show generated files
        run: cat android/settings.gradle* 2>/dev/null || echo "no settings.gradle found"

      - name: Fix Android config
        run: |
          # minSdk 24 (required by flutter_tts)
          # minSdk 24 - file is build.gradle.kts (Kotlin DSL)
          sed -i 's/minSdk = .*/minSdk = 24/' android/app/build.gradle.kts
          echo "=== minSdk ===" && grep "minSdk" android/app/build.gradle.kts

          # Kotlin version - file is settings.gradle (Groovy)
          echo "=== Kotlin before ==="
          cat android/settings.gradle | grep kotlin || echo "no kotlin in settings.gradle"
          cat android/settings.gradle.kts | grep kotlin 2>/dev/null || echo "no settings.gradle.kts either"
          find android -name "settings*" -exec grep -l kotlin {} \;
          # Try both formats
          sed -i 's/"org.jetbrains.kotlin.android" version ".*"/"org.jetbrains.kotlin.android" version "2.0.21"/' android/settings.gradle 2>/dev/null || true
          echo "=== Kotlin after ==="
          grep "kotlin" android/settings.gradle 2>/dev/null || echo "not in settings.gradle"

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/app.apk
