name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64
      - name: Create Android files
        run: flutter create --platforms=android .
      - name: Fix Android config
        run: |
          # Fix minSdk
          sed -i 's/minSdk = .*/minSdk = 24/' android/app/build.gradle.kts
          grep "minSdk" android/app/build.gradle.kts
          # Fix Kotlin version (try both .kts and .gradle)
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "2.0.21"/' android/settings.gradle.kts 2>/dev/null || true
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "2.0.21"/' android/settings.gradle 2>/dev/null || true
          grep "kotlin" android/settings.gradle*
      - name: Get packages
        run: flutter pub get
      - name: Build APK
        run: flutter build apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/app.apk
