name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64
      - name: Create Android platform files
        run: flutter create --platforms=android .
      - name: Fix minSdk
        run: |
          echo "=== Looking for build files ==="
          find . -name "build.gradle*" -o -name "build.gradle.kts" | head -10
          echo "=== Fixing ==="
          find . -name "build.gradle*" -exec grep -l "minSdk" {} \; -exec sed -i 's/minSdk = .*/minSdk = 24/' {} \; 2>/dev/null || true
          find . -name "build.gradle*" -exec grep -l "minSdk" {} \; -exec echo "Fixed: {}" \;
      - name: Get packages
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/app-release.apk
