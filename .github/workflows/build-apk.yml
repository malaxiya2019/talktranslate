name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64
      - name: Create Android files
        run: flutter create --platforms=android .

      - name: Inject overlay service
        run: |
          # 复制悬浮窗服务
          mkdir -p android/app/src/main/java/com/talktranslate/app
          cp android-overlay/TalkTranslateOverlayService.java android/app/src/main/java/com/talktranslate/app/
          cp android-overlay/MainActivity.java android/app/src/main/java/com/talktranslate/app/

          # 权限 + 服务声明
          sed -i 's/<application/<uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"\/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"\/><uses-permission android:name="android.permission.RECORD_AUDIO"\/><application/' android/app/src/main/AndroidManifest.xml
          sed -i 's/<\/application>/  <service android:name=".TalkTranslateOverlayService" android:exported="false"\/><\/application>/' android/app/src/main/AndroidManifest.xml

      - name: Get packages
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/app-release.apk
