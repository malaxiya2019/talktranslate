name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64
      - name: Create Android files
        run: flutter create --platforms=android .
      - name: Fix minSdk
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4G" >> android/gradle.properties
          echo "flutter.minSdkVersion=24" >> android/gradle.properties
          echo "flutter.targetSdkVersion=34" >> android/gradle.properties
          echo "flutter.compileSdkVersion=34" >> android/gradle.properties
      - name: Get packages
        run: flutter pub get
      - name: Build APK
        run: flutter build apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/app.apk
