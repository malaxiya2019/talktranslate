name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64
      - name: Create Android files
        run: flutter create --platforms=android .
      - name: Fix minSdk
        run: |
          cat android/app/build.gradle
          sed -i 's/minSdk .*/minSdk 24/' android/app/build.gradle
          echo '--- after fix ---'
          grep minSdk android/app/build.gradle
      - name: Get packages
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/app-release.apk
