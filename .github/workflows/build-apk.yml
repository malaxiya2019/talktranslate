name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          architecture: x64
      - name: Create Android files
        run: flutter create --platforms=android .
      - name: Fix minSdk
        run: |
          echo "=== Looking for build.gradle ==="
          find . -name "build.gradle" -type f
          echo "=== File content ==="
          cat android/app/build.gradle 2>/dev/null || echo "not found at android/app/build.gradle"
          echo "=== Trying to fix ==="
          find . -name "build.gradle" -path "*/app/*" -exec sed -i 's/minSdk = .*/minSdk = 24/' {} \;
          echo "=== After fix ==="
          grep -r "minSdk" android/app/ 2>/dev/null || echo "minSdk not found"
      - name: Get packages
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talktranslate-apk
          path: build/app/outputs/flutter-apk/app-release.apk
