name: talktranslate
description: "通话实时翻译 — 扬声器模式下显示翻译字幕"
publish_to: 'none'
version: 1.5.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 语音识别
  speech_to_text: ^7.0.0
  
  # 翻译 API
  http: ^1.2.0
  
  # UI 状态
  provider: ^6.1.0
  
  # 本地存储
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
