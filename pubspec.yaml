name: talktranslate
description: "实时双语翻译通话App — VoIP + 实时翻译"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 通话
  flutter_webrtc: ^0.11.0
  
  # WebSocket 信令
  web_socket_channel: ^3.0.0
  
  # 翻译
  http: ^1.2.0
  
  # UI
  provider: ^6.1.0
  
  # 本地存储
  shared_preferences: ^2.2.0
  
  # 权限
  permission_handler: ^11.3.0
  
  # 工具
  uuid: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
