publish_to: 'none'
version: 2.0.2+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_webrtc: ^0.12.12
  web_socket_channel: ^3.0.3
  provider: ^6.1.5
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  speech_to_text: ^7.4.0
  flutter_tts: ^3.8.5
  http: ^1.6.0
  flutter_overlay_window: ^0.4.5
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0

flutter:
  uses-material-design: true
