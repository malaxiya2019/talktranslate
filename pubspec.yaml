name: talktranslate
description: "实时双语翻译通话App — Real-time bilingual translation calling app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 通话
  flutter_webrtc: ^0.11.0
  signalr_core: ^1.4.0
  
  # 语音识别 (STT)
  speech_to_text: ^6.6.0
  
  # 语音合成 (TTS)
  flutter_tts: ^4.0.0
  
  # 翻译 API
  http: ^1.2.0
  
  # UI
  provider: ^6.1.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.0
  
  # 本地存储
  shared_preferences: ^2.2.0
  
  # 权限
  permission_handler: ^11.3.0
  
  # 工具
  uuid: ^4.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/flags/
